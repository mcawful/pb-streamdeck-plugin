name: PR to release branch

# Runs Vitest (unit + HTTP integration) when a pull request targets the release branch(es).
# To block merges until this passes: Settings → Branches → edit the rule for `release`
# (and/or `release/**`) → Require status checks → enable "PR to release branch / test".
on:
  workflow_dispatch:
  pull_request:
    branches:
      - release
      - "release/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Run integration tests
        run: npm run test:integration
